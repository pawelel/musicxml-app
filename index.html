<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MusicXML Player</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: #0f0f17;
      color: #e0e0e0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    #app {
      width: 100%;
      max-width: 540px;
      display: flex;
      flex-direction: column;
      gap: 24px;
    }
    h1 {
      font-size: 1.5rem;
      font-weight: 700;
      color: #fff;
      letter-spacing: -0.02em;
    }

    /* Drop zone */
    #drop-zone {
      border: 2px dashed #333;
      border-radius: 12px;
      padding: 48px 24px;
      text-align: center;
      cursor: pointer;
      transition: border-color 0.2s, background 0.2s;
      color: #888;
      font-size: 0.9rem;
      line-height: 1.6;
    }
    #drop-zone:hover, #drop-zone.drag-over {
      border-color: #4a90d9;
      background: rgba(74, 144, 217, 0.05);
      color: #bbb;
    }
    #drop-zone .icon { font-size: 2.5rem; margin-bottom: 12px; }
    #file-input { display: none; }

    /* Status badge */
    #status-bar {
      display: none;
      align-items: center;
      gap: 10px;
      font-size: 0.85rem;
      color: #aaa;
    }
    #status-bar.visible { display: flex; }
    .spinner {
      width: 16px; height: 16px;
      border: 2px solid #333;
      border-top-color: #4a90d9;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      flex-shrink: 0;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* Player bar */
    #player-bar {
      display: none;
      flex-direction: column;
      gap: 14px;
      background: #1a1a2a;
      border-radius: 12px;
      padding: 20px;
    }
    #player-bar.visible { display: flex; }
    #file-name {
      font-size: 0.85rem;
      color: #888;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .player-controls {
      display: flex;
      align-items: center;
      gap: 16px;
    }
    #play-btn {
      width: 48px; height: 48px;
      border-radius: 50%;
      background: #4a90d9;
      border: none;
      cursor: pointer;
      font-size: 1.2rem;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: background 0.15s;
    }
    #play-btn:hover { background: #3a80c9; }
    .progress-wrap { flex: 1; }
    #progress-bar {
      width: 100%;
      height: 4px;
      background: #333;
      border-radius: 2px;
      overflow: hidden;
      margin-bottom: 6px;
    }
    #progress-fill {
      height: 100%;
      background: #4a90d9;
      width: 0%;
      transition: width 0.1s linear;
    }
    .time-labels {
      display: flex;
      justify-content: space-between;
      font-size: 0.75rem;
      color: #666;
    }

    /* Error */
    #error-bar {
      display: none;
      background: #2a1010;
      border: 1px solid #c0392b;
      border-radius: 8px;
      padding: 14px 16px;
      font-size: 0.85rem;
      color: #e74c3c;
      line-height: 1.5;
    }
    #error-bar.visible { display: block; }
  </style>
</head>
<body>
  <div id="app">
    <h1>🎹 MusicXML Player</h1>

    <div id="drop-zone">
      <div class="icon">🎼</div>
      <div>Drag a <strong>.musicxml</strong> file here</div>
      <div style="margin-top:6px;font-size:0.8rem">or click to select</div>
      <input type="file" id="file-input" accept=".musicxml,.xml" />
    </div>

    <div id="status-bar">
      <div class="spinner"></div>
      <span id="status-text">Parsing…</span>
    </div>

    <div id="player-bar">
      <div id="file-name"></div>
      <div class="player-controls">
        <button id="play-btn">▶</button>
        <div class="progress-wrap">
          <div id="progress-bar"><div id="progress-fill"></div></div>
          <div class="time-labels">
            <span id="time-current">0:00</span>
            <span id="time-total">0:00</span>
          </div>
        </div>
      </div>
    </div>

    <div id="error-bar"></div>
  </div>
  <script type="module" src="/src/main.js"></script>
</body>
</html>
